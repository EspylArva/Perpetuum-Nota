# Dev override: run ONLY Postgres in Docker (exposed on localhost:5432),
# while you run the NestJS API and Angular app natively for fast reloads.
#
# `name:` keeps this stack in its own compose project. Without it, this file
# and docker-compose.yml share the project namespace derived from the folder
# ("stickynotes"), and bringing one up RECREATES the other's `db` container.
name: stickynotes-dev

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stickynotes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stickynotes}
      POSTGRES_DB: ${POSTGRES_DB:-stickynotes}
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data

volumes:
  pgdata_dev:
