server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # allow image uploads through the proxy
    client_max_body_size 25m;

    # Baseline security headers for the static SPA + proxied responses.
    # Add HSTS (Strict-Transport-Security) once TLS terminates here.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API + permission-checked image serving (everything under /api, incl. /api/uploads/:id)
    # served by NestJS, never as a static alias, so PRIVATE images stay access-controlled.
    location /api/ {
        proxy_pass         http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Cookie            $http_cookie;
    }

    # SPA: serve static assets, fall back to index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
