@for (node of roots(); track node.id) {
  <div class="folder-node">
    <div class="folder-row" [class.active]="node.id === activeId()"
         [style.paddingLeft.px]="8 + node.depth * 14">
      @if (node.children.length > 0) {
        <button type="button" class="twisty" (click)="toggle.emit(node.id)"
                [attr.aria-label]="isExpanded(node.id) ? 'Collapse' : 'Expand'">
          <mat-icon inline>{{ isExpanded(node.id) ? 'expand_more' : 'chevron_right' }}</mat-icon>
        </button>
      } @else {
        <span class="twisty-spacer"></span>
      }
      <button type="button" class="folder-name" (click)="select.emit(node.id)"
              [matTooltip]="node.name">
        <mat-icon inline class="folder-ico">folder</mat-icon>
        <span class="name-text">{{ node.name }}</span>
        <span class="count">{{ node.noteCount }}</span>
      </button>
      <button type="button" class="folder-menu-btn" [matMenuTriggerFor]="folderMenu"
              (click)="$event.stopPropagation()" aria-label="Folder actions">
        <mat-icon inline>more_vert</mat-icon>
      </button>
      <mat-menu #folderMenu="matMenu">
        <button mat-menu-item (click)="newSubfolder.emit(node)">
          <mat-icon>create_new_folder</mat-icon><span>New subfolder</span>
        </button>
        <button mat-menu-item (click)="rename.emit(node)">
          <mat-icon>edit</mat-icon><span>Rename</span>
        </button>
        <button mat-menu-item (click)="remove.emit(node)">
          <mat-icon>delete</mat-icon><span>Delete</span>
        </button>
      </mat-menu>
    </div>

    @if (node.children.length > 0 && isExpanded(node.id)) {
      <app-folder-tree
        [nodes]="node.children"
        [activeId]="activeId()"
        [expanded]="expanded()"
        (select)="select.emit($event)"
        (toggle)="toggle.emit($event)"
        (newSubfolder)="newSubfolder.emit($event)"
        (rename)="rename.emit($event)"
        (remove)="remove.emit($event)" />
    }
  </div>
}
