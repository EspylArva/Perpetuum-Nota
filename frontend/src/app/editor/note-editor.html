<div class="note-editor">
  @if (conflicted()) {
    <div class="conflict-banner" role="alert">
      <span>This note was changed in another window.</span>
      <button type="button" class="reload" (click)="reloadServerCopy()">Load latest (discard mine)</button>
      <button type="button" class="keep" (click)="keepMine()">Keep mine (overwrite)</button>
    </div>
  }
  @if (editable()) {
    <div class="toolbar">
      <button type="button" title="Bold" [class.active]="isActive('bold')" (click)="toggleBold()"><b>B</b></button>
      <button type="button" title="Italic" [class.active]="isActive('italic')" (click)="toggleItalic()"><i>I</i></button>
      <button type="button" title="Underline" [class.active]="isActive('underline')" (click)="toggleUnderline()"><u>U</u></button>
      <button type="button" title="Strikethrough" [class.active]="isActive('strike')" (click)="toggleStrike()"><s>S</s></button>
      <span class="sep"></span>
      <button type="button" title="Heading 1" [class.active]="isActive('heading', { level: 1 })" (click)="toggleHeading(1)">H1</button>
      <button type="button" title="Heading 2" [class.active]="isActive('heading', { level: 2 })" (click)="toggleHeading(2)">H2</button>
      <span class="sep"></span>
      <button type="button" title="Bulleted list" [class.active]="isActive('bulletList')" (click)="toggleBulletList()">• List</button>
      <button type="button" title="Numbered list" [class.active]="isActive('orderedList')" (click)="toggleOrderedList()">1. List</button>
      <button type="button" title="Checklist" [class.active]="isActive('taskList')" (click)="toggleTaskList()">☑ Tasks</button>
      <span class="sep"></span>
      <button type="button" title="Link" [class.active]="isActive('link')" (click)="setLink()">🔗</button>
      <button type="button" title="Export as HTML" (click)="exportHtml()">⬇</button>
      <span class="spacer"></span>
      <span class="status">{{ status() }}</span>
    </div>
  }
  <div class="surface" tiptap [editor]="editor"></div>
</div>
