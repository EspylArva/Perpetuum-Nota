<div class="note-editor">
  @if (conflicted()) {
    <div class="conflict-banner" role="alert">
      <span>This note was changed in another window.</span>
      <button matButton="outlined" class="reload" (click)="reloadServerCopy()">Load latest (discard mine)</button>
      <button matButton="filled" class="keep" (click)="keepMine()">Keep mine (overwrite)</button>
    </div>
  }
  @if (editable()) {
    <div class="toolbar">
      <button matIconButton matTooltip="Bold" [class.active]="isActive('bold')" (click)="toggleBold()">
        <mat-icon>format_bold</mat-icon>
      </button>
      <button matIconButton matTooltip="Italic" [class.active]="isActive('italic')" (click)="toggleItalic()">
        <mat-icon>format_italic</mat-icon>
      </button>
      <button matIconButton matTooltip="Underline" [class.active]="isActive('underline')" (click)="toggleUnderline()">
        <mat-icon>format_underlined</mat-icon>
      </button>
      <button matIconButton matTooltip="Strikethrough" [class.active]="isActive('strike')" (click)="toggleStrike()">
        <mat-icon>strikethrough_s</mat-icon>
      </button>
      <span class="sep"></span>
      <button matIconButton class="h-btn" matTooltip="Heading 1" [class.active]="isActive('heading', { level: 1 })" (click)="toggleHeading(1)">H1</button>
      <button matIconButton class="h-btn" matTooltip="Heading 2" [class.active]="isActive('heading', { level: 2 })" (click)="toggleHeading(2)">H2</button>
      <span class="sep"></span>
      <button matIconButton matTooltip="Bulleted list" [class.active]="isActive('bulletList')" (click)="toggleBulletList()">
        <mat-icon>format_list_bulleted</mat-icon>
      </button>
      <button matIconButton matTooltip="Numbered list" [class.active]="isActive('orderedList')" (click)="toggleOrderedList()">
        <mat-icon>format_list_numbered</mat-icon>
      </button>
      <button matIconButton matTooltip="Checklist" [class.active]="isActive('taskList')" (click)="toggleTaskList()">
        <mat-icon>checklist</mat-icon>
      </button>
      <span class="sep"></span>
      <button matIconButton matTooltip="Link" [class.active]="isActive('link')" (click)="setLink()">
        <mat-icon>link</mat-icon>
      </button>
      <button matIconButton matTooltip="Export as HTML" (click)="exportHtml()">
        <mat-icon>download</mat-icon>
      </button>
      <span class="spacer"></span>
      <span class="status">{{ status() }}</span>
    </div>
  }
  <div class="surface" tiptap [editor]="editor"></div>
</div>
