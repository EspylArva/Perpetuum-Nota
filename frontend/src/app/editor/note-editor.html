<div class="note-editor">
  @if (conflicted()) {
    <div class="conflict-banner" role="alert">
      <span>This note was changed in another window.</span>
      <button matButton="outlined" class="reload" (click)="reloadServerCopy()">Load latest (discard mine)</button>
      <button matButton="filled" class="keep" (click)="keepMine()">Keep mine (overwrite)</button>
    </div>
  }
  @if (editable()) {
    <div class="toolbar">
      <button matIconButton matTooltip="Bold" [class.active]="isActive('bold')" (click)="toggleBold()">
        <mat-icon>format_bold</mat-icon>
      </button>
      <button matIconButton matTooltip="Italic" [class.active]="isActive('italic')" (click)="toggleItalic()">
        <mat-icon>format_italic</mat-icon>
      </button>
      <button matIconButton matTooltip="Underline" [class.active]="isActive('underline')" (click)="toggleUnderline()">
        <mat-icon>format_underlined</mat-icon>
      </button>
      <button matIconButton matTooltip="Strikethrough" [class.active]="isActive('strike')" (click)="toggleStrike()">
        <mat-icon>strikethrough_s</mat-icon>
      </button>
      <span class="sep"></span>
      <button matIconButton class="h-btn" matTooltip="Heading 1" [class.active]="isActive('heading', { level: 1 })" (click)="toggleHeading(1)">H1</button>
      <button matIconButton class="h-btn" matTooltip="Heading 2" [class.active]="isActive('heading', { level: 2 })" (click)="toggleHeading(2)">H2</button>
      <span class="sep"></span>
      <button matIconButton matTooltip="Bulleted list" [class.active]="isActive('bulletList')" (click)="toggleBulletList()">
        <mat-icon>format_list_bulleted</mat-icon>
      </button>
      <button matIconButton matTooltip="Numbered list" [class.active]="isActive('orderedList')" (click)="toggleOrderedList()">
        <mat-icon>format_list_numbered</mat-icon>
      </button>
      <button matIconButton matTooltip="Checklist" [class.active]="isActive('taskList')" (click)="toggleTaskList()">
        <mat-icon>checklist</mat-icon>
      </button>
      <button matIconButton matTooltip="Code block" [class.active]="isActive('codeBlock')" (click)="toggleCodeBlock()">
        <mat-icon>code</mat-icon>
      </button>
      <span class="sep"></span>
      <button matIconButton matTooltip="Text color" [matMenuTriggerFor]="colorMenu">
        <mat-icon>format_color_text</mat-icon>
      </button>
      <mat-menu #colorMenu="matMenu" class="color-menu">
        <div class="swatch-grid">
          @for (color of textColors; track color) {
            <button
              type="button"
              class="swatch"
              [style.background]="color"
              [attr.aria-label]="'Set text color ' + color"
              (click)="setColor(color)"
            ></button>
          }
        </div>
        <button mat-menu-item (click)="unsetColor()">
          <mat-icon>format_color_reset</mat-icon>
          <span>Default</span>
        </button>
      </mat-menu>
      <button matIconButton matTooltip="Text size" [matMenuTriggerFor]="sizeMenu">
        <mat-icon>format_size</mat-icon>
      </button>
      <mat-menu #sizeMenu="matMenu">
        <button mat-menu-item (click)="setFontSize('0.85em')">Small</button>
        <button mat-menu-item (click)="unsetFontSize()">Normal</button>
        <button mat-menu-item (click)="setFontSize('1.25em')">Large</button>
        <button mat-menu-item (click)="setFontSize('1.5em')">Huge</button>
      </mat-menu>
      <span class="sep"></span>
      <button matIconButton matTooltip="Link" [class.active]="isActive('link')" (click)="setLink()">
        <mat-icon>link</mat-icon>
      </button>
      <!-- Export split button: primary action = Markdown; arrow opens format menu -->
      <div class="export-split">
        <button matIconButton matTooltip="Export as Markdown" (click)="exportMarkdown()">
          <mat-icon>download</mat-icon>
        </button>
        <button matIconButton matTooltip="Export options" [matMenuTriggerFor]="exportMenu" class="export-arrow">
          <mat-icon>arrow_drop_down</mat-icon>
        </button>
      </div>
      <mat-menu #exportMenu="matMenu">
        <button mat-menu-item (click)="exportMarkdown()">
          <mat-icon>download</mat-icon>
          <span>Markdown (.md)</span>
        </button>
        <button mat-menu-item (click)="exportHtml()">
          <mat-icon>code</mat-icon>
          <span>HTML (.html)</span>
        </button>
      </mat-menu>
      <!-- TOC toggle -->
      <button matIconButton matTooltip="Table of contents" [class.active]="tocVisible()" (click)="toggleToc()">
        <mat-icon>toc</mat-icon>
      </button>
      <span class="spacer"></span>
      <span class="status">{{ status() }}</span>
    </div>
  }
  <div class="editor-body">
    @if (tocVisible() && tocEntries().length > 0) {
      <nav class="toc-panel" aria-label="Table of contents">
        <div class="toc-heading">Contents</div>
        @for (entry of tocEntries(); track entry.pos) {
          <button
            type="button"
            class="toc-entry"
            [style.padding-left.rem]="0.5 + (entry.level - 1) * 0.75"
            (click)="navigateToHeading(entry)"
          >{{ entry.text }}</button>
        }
      </nav>
    }
    <div class="surface" tiptap [editor]="editor"></div>
  </div>
</div>
