<div class="login-wrap">
  <form class="login-card" (ngSubmit)="submit()">
    <div class="brand">
      <span class="dot"></span>
      <h1>Sticky Notes</h1>
    </div>
    <p class="sub">Sign in to your notes</p>

    <mat-form-field appearance="outline">
      <mat-label>Email</mat-label>
      <input matInput type="email" name="email" [(ngModel)]="email" required
             autocomplete="username" autofocus />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Password</mat-label>
      <input matInput type="password" name="password" [(ngModel)]="password" required
             autocomplete="current-password" />
    </mat-form-field>

    @if (error()) {
      <p class="err">{{ error() }}</p>
    }

    <button matButton="filled" type="submit" [disabled]="loading()">
      {{ loading() ? 'Signing in…' : 'Sign in' }}
    </button>
  </form>
</div>
