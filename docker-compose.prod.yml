name: perpetuum-nota

# docker-compose.prod.yml — NAS deployment (pulls prebuilt images from Zot).
#
# Unlike docker-compose.yml (which builds locally), this file pulls the three
# multi-arch, cosign-signed images you pushed with scripts/deploy-to-zot.sh.
# The NAS is aarch64; the images are multi-arch, so the right arch is pulled
# automatically.
#
# Images are addressed EXPLICITLY at the local Zot registry (127.0.0.1:5000),
# NOT by bare "perpetuum-nota/..." names. A bare name is the docker.io image
# docker.io/perpetuum-nota/api, and dockerd authorizes docker.io names against
# Docker Hub — where these repos don't exist — so the pull fails with "access
# denied" even though Zot is registered as a registry-mirror and serves the
# image (a mirror is only a pull-through CACHE for Hub, not a host for your own
# repos). Naming Zot directly makes it the source of truth: no Hub, no fallback.
# dockerd auto-trusts 127.0.0.0/8 over HTTP, so no insecure-registries entry and
# no TLS/login are needed for the loopback address.
#
# (The daemon.json registry-mirror -> http://127.0.0.1:5000 can stay; it only
# caches real Docker Hub pulls and is independent of the explicit names below.)
#
# Deploy / update (on the NAS, from this file's directory):
#   sudo docker compose --env-file .env pull
#   sudo docker compose --env-file .env up -d
# (Tip: `sudo usermod -aG docker $USER` then re-login lets you drop the sudo.)
#
# Set real secrets in .env first (see .env.example).

services:
  db:
    image: 127.0.0.1:5000/perpetuum-nota/postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    # Defaults to :latest; pin a release by setting API_TAG (a version tag
    # printed by scripts/deploy-to-zot.sh) in .env or the pull/up environment.
    image: 127.0.0.1:5000/perpetuum-nota/api:${API_TAG:-latest}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      CSRF_SECRET: ${CSRF_SECRET:-${JWT_SECRET}}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_FORCE_PASSWORD_RESET: ${ADMIN_FORCE_PASSWORD_RESET:-}
      UPLOADS_DIR: ${UPLOADS_DIR:-/data/uploads}
      NODE_ENV: production
      PORT: 3000
    volumes:
      - uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # 127.0.0.1, not localhost: Alpine resolves localhost to ::1 first and the
      # app binds 0.0.0.0 (IPv4), so busybox wget would get connection-refused.
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    # Pin a release with WEB_TAG (mirrors API_TAG); defaults to :latest.
    image: 127.0.0.1:5000/perpetuum-nota/web:${WEB_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
